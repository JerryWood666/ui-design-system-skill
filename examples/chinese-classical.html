<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chinese Classical Demo</title>
  <link rel="stylesheet" href="../tokens/ui-tokens.css">
  <style>
    :root {
      --paper: #f7f0df;
      --ink: #1f211d;
      --muted: #746b5d;
      --line: #d6c7a8;
      --cinnabar: #9f2d20;
      --green: #2f5d50;
      --surface: rgba(255, 250, 238, .72);
      --border: var(--line);
      --accent: var(--cinnabar);
      --panel-radius: 3px;
      --button-radius: 2px;
    }
    body {
      background:
        linear-gradient(rgba(31, 33, 29, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 33, 29, .025) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
      color: var(--ink);
      min-height: 100vh;
    }
    .page {
      display: grid;
      gap: 32px;
      grid-template-columns: 220px minmax(0, 1fr) 280px;
      margin: 0 auto;
      max-width: 1220px;
      padding: 42px 24px;
    }
    .catalog {
      border-right: 1px solid var(--line);
      padding-right: 22px;
    }
    .seal {
      align-content: center;
      background: var(--cinnabar);
      color: #fff7ec;
      display: grid;
      font-family: var(--font-serif);
      font-size: 22px;
      height: 62px;
      justify-content: center;
      margin-bottom: 32px;
      width: 62px;
    }
    .catalog a {
      color: var(--muted);
      display: block;
      font-family: var(--font-serif);
      padding: 10px 0;
    }
    .catalog a.active {
      color: var(--cinnabar);
    }
    .article {
      min-width: 0;
    }
    .eyebrow {
      color: var(--cinnabar);
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(42px, 7vw, 84px);
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1.03;
      margin: 0;
      max-width: 780px;
    }
    .summary {
      border-left: 4px solid var(--cinnabar);
      color: #4d473d;
      font-size: 18px;
      margin: 28px 0 34px;
      max-width: 680px;
      padding-left: 18px;
    }
    .chapter {
      background: rgba(255, 250, 238, .66);
      border-bottom: 1px solid var(--line);
      border-top: 1px solid var(--line);
      display: grid;
      gap: 20px;
      grid-template-columns: 90px minmax(0, 1fr);
      padding: 24px 0;
    }
    .chapter strong {
      color: var(--green);
      font-family: var(--font-serif);
      font-size: 28px;
    }
    .chapter p {
      color: #3c3932;
      font-size: 17px;
      margin: 0;
    }
    .notes {
      align-self: start;
      border: 1px solid var(--line);
      padding: 20px;
    }
    .notes h2 {
      color: var(--green);
      font-family: var(--font-serif);
      font-size: 24px;
      margin: 0 0 16px;
    }
    .note {
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      padding: 14px 0;
    }
    .seal-button {
      background: var(--cinnabar);
      color: #fff7ec;
      margin-top: 10px;
    }
    @media (max-width: 960px) {
      .page {
        grid-template-columns: 1fr;
      }
      .catalog {
        border-bottom: 1px solid var(--line);
        border-right: 0;
        display: flex;
        gap: 18px;
        overflow-x: auto;
        padding-bottom: 14px;
        padding-right: 0;
      }
      .seal {
        flex: 0 0 auto;
        margin: 0;
      }
      .catalog a {
        white-space: nowrap;
      }
    }
    @media (max-width: 560px) {
      .page {
        padding: 28px 16px;
      }
      .chapter {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="catalog" aria-label="目录">
      <div class="seal">观</div>
      <a class="active" href="#">山水卷</a>
      <a href="#">器物谱</a>
      <a href="#">茶事录</a>
      <a href="#">题跋</a>
    </nav>
    <article class="article">
      <div class="eyebrow">Classical content product</div>
      <h1>一卷山水，三处留白</h1>
      <p class="summary">用现代界面承载古典内容，重点不是堆纹样，而是控制纸感、字距、注释和阅读节奏。</p>
      <section class="chapter">
        <strong>其一</strong>
        <p>山形不必满屏，水墨也不必模拟得很真。界面只保留纸的温度、朱砂的秩序和文字的呼吸。</p>
      </section>
      <section class="chapter">
        <strong>其二</strong>
        <p>注释不应打断正文，而应像题跋一样站在旁侧。用户可以阅读，也可以收藏、摘录和继续探索。</p>
      </section>
      <button class="ui-button seal-button">收入案头</button>
    </article>
    <aside class="notes">
      <h2>旁注</h2>
      <div class="note">色彩以米白、墨黑、朱砂、竹青为主，不做低对比棕色泥潭。</div>
      <div class="note">中文标题使用宋体气质，正文仍要保持现代屏幕可读。</div>
      <div class="note">边框细，圆角小，重点靠排版和留白。</div>
    </aside>
  </main>
</body>
</html>
