<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UI Spec Lab</title>
  <link rel="stylesheet" href="../tokens/ui-tokens.css">
  <style>
    body {
      background: #f5f2ea;
      color: #161512;
    }
    .shell {
      margin: 0 auto;
      max-width: 1120px;
      padding: 64px 24px;
    }
    .topline {
      color: #7c5f2f;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(38px, 6vw, 72px);
      line-height: 1;
      margin: 18px 0 18px;
      max-width: 850px;
    }
    .intro {
      color: #5c5a52;
      font-size: 18px;
      max-width: 720px;
    }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 48px;
    }
    .card {
      background: #fffaf0;
      border: 1px solid #d8cdb8;
      border-radius: 8px;
      min-height: 260px;
      padding: 22px;
      position: relative;
      transition: transform .2s var(--ease-out), box-shadow .2s var(--ease-out);
    }
    .card:hover {
      box-shadow: 0 18px 34px rgba(37, 33, 24, .12);
      transform: translateY(-4px);
    }
    .card strong {
      display: block;
      font-size: 20px;
      margin-bottom: 10px;
    }
    .card p {
      color: #686258;
      font-size: 14px;
      margin: 0;
    }
    .tag {
      border-top: 1px solid #d8cdb8;
      bottom: 18px;
      color: #8b2f1d;
      font-size: 12px;
      font-weight: 800;
      left: 22px;
      padding-top: 14px;
      position: absolute;
      right: 22px;
    }
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 560px) {
      .shell {
        padding: 40px 16px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topline">UI Spec Lab</div>
    <h1>把审美变成可复用的工程能力</h1>
    <p class="intro">这里不是组件截图收藏夹，而是一套给 Codex 使用的风格、tokens、组件规则和页面样例。先选风格，再写页面，最后截图验收。</p>
    <section class="grid" aria-label="HTML 样例">
      <a class="card" href="./modern-saas.html">
        <strong>Modern SaaS</strong>
        <p>AI 工具台、开发者产品、命令面板、细边框和高效工作区。</p>
        <span class="tag">Open demo</span>
      </a>
      <a class="card" href="./apple-productivity.html">
        <strong>Apple-like</strong>
        <p>个人效率工具，半透明分栏、柔和阴影和系统级控件。</p>
        <span class="tag">Open demo</span>
      </a>
      <a class="card" href="./chinese-classical.html">
        <strong>中式古典</strong>
        <p>宣纸、宋体、朱砂、注释栏和内容阅读节奏。</p>
        <span class="tag">Open demo</span>
      </a>
      <a class="card" href="./admin-console.html">
        <strong>Admin Console</strong>
        <p>高密度后台、筛选、表格、状态和批量操作。</p>
        <span class="tag">Open demo</span>
      </a>
    </section>
  </main>
</body>
</html>
